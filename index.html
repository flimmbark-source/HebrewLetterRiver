  <script>
    (function bootstrapLetterRiverDevConsole() {
      var hostname = window.location.hostname;
      var isDevHost = hostname === 'localhost' || hostname === '127.0.0.1' || hostname.endsWith('.github.dev') || hostname.endsWith('.app.github.dev');
      var showDebugLogs = false;

      try {
        showDebugLogs = window.localStorage.getItem('LETTER_RIVER_DEBUG_LOGS') === '1';
      } catch (error) {
        showDebugLogs = false;
      }

      if (isDevHost && !showDebugLogs) {
        var originalLog = console.log.bind(console);
        var originalInfo = console.info.bind(console);
        var noisyPatterns = [
          /^Generated Segment\b/,
          /^\[TTS\]/,
          /^\[Bootstrap\]/,
          /^\[Migration\] No migration needed/,
          /^✓ Cafe Talk validation passed/,
          /^✓ Section Dictionary validation passed/
        ];

        function shouldSuppress(args) {
          var first = args && args.length > 0 ? String(args[0]) : '';
          return noisyPatterns.some(function(pattern) { return pattern.test(first); });
        }

        console.log = function() {
          if (shouldSuppress(arguments)) return;
          originalLog.apply(console, arguments);
        };

        console.info = function() {
          if (shouldSuppress(arguments)) return;
          originalInfo.apply(console, arguments);
        };
      }

      // GitHub Codespaces/dev tunnels often redirect /manifest.webmanifest through
      // github.dev sign-in, which produces a CORS console error before the app loads.
      // Inject the manifest everywhere except those tunneled dev hosts.
      if (!hostname.endsWith('.app.github.dev')) {
        var manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = '/manifest.webmanifest';
        document.head.appendChild(manifestLink);
      }
    })();
  </script>

  <!-- Reveal Material Symbols icons only once the font is confirmed ready.
       If the font cannot be confirmed, ms-failed is added instead. CSS keeps
       the ligature text hidden so words like home and play_arrow never leak
       into the UI. -->
  <script>
    (function () {
      var done = false;
      var timeoutId = null;
      var maxAttempts = 75;

      var reveal = function () {
        if (done) return;
        done = true;
        if (timeoutId) clearTimeout(timeoutId);
        document.documentElement.classList.remove('ms-failed');
        document.documentElement.classList.add('ms-ready');
      };

      var fail = function () {
        if (done) return;
        done = true;
        document.documentElement.classList.remove('ms-ready');
        document.documentElement.classList.add('ms-failed');
      };

      if (!document.fonts || !document.fonts.load) {
        fail();
        return;
      }

      timeoutId = setTimeout(fail, 15000);
      var attempts = 0;

      (function tryLoad() {
        document.fonts.load('1em "Material Symbols Outlined"').then(function (faces) {
          var ready = faces.length > 0;
          if (ready && document.fonts.check) { ready = document.fonts.check('1em "Material Symbols Outlined"'); }
          if (ready) {
            reveal();
            return;
          }
          attempts += 1;
          if (attempts < maxAttempts) { setTimeout(tryLoad, 200); }
          else { fail(); }
        }).catch(function () {
          attempts += 1;
          if (attempts < maxAttempts) { setTimeout(tryLoad, 200); }
          else { fail(); }
        });
      }());
    })();
  </script>
