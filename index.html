  <script>
    (function bootstrapLetterRiverDevConsole() {
      var hostname = window.location.hostname;
      var isDevHost = hostname === 'localhost' || hostname === '127.0.0.1' || hostname.endsWith('.github.dev') || hostname.endsWith('.app.github.dev');
      var showDebugLogs = false;

      try {
        showDebugLogs = window.localStorage.getItem('LETTER_RIVER_DEBUG_LOGS') === '1';
      } catch (error) {
        showDebugLogs = false;
      }

      if (isDevHost && !showDebugLogs) {
        var originalLog = console.log.bind(console);
        var originalInfo = console.info.bind(console);
        var noisyPatterns = [
          /^Generated Segment\b/,
          /^\[TTS\]/,
          /^\[Bootstrap\]/,
          /^\[Migration\] No migration needed/,
          /^✓ Cafe Talk validation passed/,
          /^✓ Section Dictionary validation passed/
        ];

        function shouldSuppress(args) {
          var first = args && args.length > 0 ? String(args[0]) : '';
          return noisyPatterns.some(function(pattern) { return pattern.test(first); });
        }

        console.log = function() {
          if (shouldSuppress(arguments)) return;
          originalLog.apply(console, arguments);
        };

        console.info = function() {
          if (shouldSuppress(arguments)) return;
          originalInfo.apply(console, arguments);
        };
      }

      // GitHub Codespaces/dev tunnels often redirect /manifest.webmanifest through
      // github.dev sign-in, which produces a CORS console error before the app loads.
      // Inject the manifest everywhere except those tunneled dev hosts.
      if (!hostname.endsWith('.app.github.dev')) {
        var manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = '/manifest.webmanifest';
        document.head.appendChild(manifestLink);
      }
    })();
  </script>

  <!-- Reveal Material Symbols icons once the font is ready.
       CSS keeps .material-symbols-outlined invisible until ms-ready lands on <html>.
       document.fonts.ready fires when all page fonts have loaded or timed out —
       more reliable than fonts.load() which can resolve empty before the @font-face
       rule is registered. 3s timeout ensures icons are never hidden forever. -->
  <script>
    (function () {
      // fonts.ready fires when layout is complete but NOT when font binaries have
      // finished downloading — with font-display:swap the font is still in-flight
      // when fonts.ready resolves. On a slow mobile connection this causes ms-ready
      // to be added before the font arrives, revealing icon text.
      //
      // fonts.load() waits for the specific font binary. It can return [] on the
      // first call if the @font-face hasn't been registered yet, so we poll.
      // fonts.check() is used as a secondary guard — it returns true only when the
      // font is genuinely available for rendering, guarding against iOS Safari
      // returning a non-empty faces array before the binary is decoded.
      //
      // The .catch handler retries rather than revealing immediately: a rejection
      // usually means the font request itself failed (e.g. the service worker
      // served a corrupt cached response). Retrying gives the network a chance to
      // serve a fresh copy. Icons stay hidden until the font is confirmed ready.
      // The 15-second hard fallback is a last resort for very slow connections.
      var done = false;
      var reveal = function () {
        if (done) return;
        done = true;
        document.documentElement.classList.add('ms-ready');
      };
      var t = setTimeout(reveal, 15000);
      if (document.fonts && document.fonts.load) {
        var attempts = 0;
        (function tryLoad() {
          document.fonts.load('1em "Material Symbols Outlined"').then(function (faces) {
            var ready = faces.length > 0;
            if (ready && document.fonts.check) { ready = document.fonts.check('1em "Material Symbols Outlined"'); }
            if (ready) { clearTimeout(t); reveal(); }
            else if (++attempts < 74) { setTimeout(tryLoad, 200); }
          }).catch(function () {
            // Retry on error rather than revealing — a rejection often means the
            // cached font response was corrupt; the next attempt may hit the network.
            if (++attempts < 74) { setTimeout(tryLoad, 200); }
          });
        }());
      }
    })();
  </script>
